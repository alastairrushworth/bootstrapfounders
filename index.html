<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bootstrapfounders — a field guide for technical founders</title>
  <meta name="description" content="A minimal directory and wiki for technically-minded founders bootstrapping a startup: podcasts, video, books, newsletters, communities, tools, launch platforms and practical traction playbooks." />
  <meta name="color-scheme" content="dark light" />

  <!-- set theme before first paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("bf-theme");
        var light = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", saved || (light ? "light" : "dark"));
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>

  <!-- static social tags (per-page title/description/canonical injected by prerender) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="bootstrapfounders" />
  <meta property="og:image" content="https://alastairrushworth.com/bootstrapfounders/assets/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="bootstrapfounders — a field guide for technical founders" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://alastairrushworth.com/bootstrapfounders/assets/og.png" />
  <!--PRERENDER:HEAD-->

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23101010'/><text x='5' y='23' font-family='monospace' font-size='18' fill='%237ec699'>&gt;_</text></svg>" />
  <link rel="apple-touch-icon" href="/bootstrapfounders/assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/bootstrapfounders/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#content">skip to content</a>

  <header class="topbar">
    <button class="icon-btn nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="sidebar">≡</button>
    <a class="brand" href="/bootstrapfounders/"><span class="brand-prompt">&gt;</span>bootstrap<span class="brand-accent">founders</span></a>

    <div class="search-wrap" role="search">

      <input id="search" type="search" placeholder="search&hellip;" aria-label="Search resources and guides" autocomplete="off" spellcheck="false" />

    <a class="txt-btn" href="https://github.com/alastairrushworth/bootstrapfounders" target="_blank" rel="noopener">src</a>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle light / dark theme" aria-pressed="false" title="Toggle light / dark">◐</button>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Site navigation">
      <nav id="nav"><!-- built by app.js --></nav>
